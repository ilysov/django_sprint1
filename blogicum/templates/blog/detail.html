{% extends 'base.html' %}

{% block title %}Пост #{{ post.id }} — Blogicum{% endblock %}

{% block content %}
<article>
    <h1>Пост #{{ post.id }}</h1>
    <p><strong>Дата:</strong> {{ post.date }}</p>
    <p><strong>Локация:</strong> {{ post.location }}</p>
    <p><strong>Категория:</strong> <a href="{% url 'blog:category_posts' post.category %}">{{ post.category }}</a></p>
    <div class="post-content">
        {{ post.text|linebreaks }}
    </div>
</article>

<p><a href="{% url 'blog:index' %}">← Вернуться к списку публикаций</a></p>
{% endblock %}
